# AI Design Review
# Runs deterministic analysis + 5 focused AI review tasks via review_ai.py.
#
# Triggers:
#   - Automatically on PRs that change KiCad files
#   - Manually by commenting /review on any PR
#
# Add this file to your KiCad project repo at:
#   .github/workflows/ai-design-review.yml
#
# Required secrets:
#   ZHIPU_API_KEY — Zhipu AI API key for LLM access
#
# Optional secrets (for datasheet download):
#   DIGIKEY_CLIENT_ID, DIGIKEY_CLIENT_SECRET
#   MOUSER_SEARCH_API_KEY
#   ELEMENT14_API_KEY

name: ai-design-review
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**/*.kicad_sch'
      - '**/*.kicad_pcb'
      - '**/*.kicad_pro'
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    if: |
      github.event.pull_request.user.login != 'opencode-agent[bot]' &&
      (
        github.event_name == 'pull_request' ||
        (
          github.event_name == 'issue_comment' &&
          (
            contains(github.event.comment.body, ' /review') ||
            startsWith(github.event.comment.body, '/review')
          )
        ) ||
        (
          github.event_name == 'pull_request_review_comment' &&
          (
            contains(github.event.comment.body, ' /review') ||
            startsWith(github.event.comment.body, '/review')
          )
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/checkout@v6
        with:
          repository: corv89/kicad-happy
          path: _kh
          ref: main
          sparse-checkout: |
            action/review_ai.py
            skills/

      - run: sudo apt-get install -y ngspice poppler-utils

      - name: AI Design Review
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SCH=$(find . -name '*.kicad_sch' -not -path './.git/*' -not -path './_kh/*' | head -1)
          PCB=$(find . -name '*.kicad_pcb' -not -path './.git/*' -not -path './_kh/*' | head -1)
          python3 _kh/action/review_ai.py ${SCH:-} ${PCB:-} --ci
