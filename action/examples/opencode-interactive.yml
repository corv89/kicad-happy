# opencode Interactive Design Review
# Invoke an AI-powered KiCad design reviewer by commenting /oc or /opencode
# on any issue or pull request.
#
# Two-tier review:
#   1. Deterministic analysis (always runs, free, no API key needed)
#   2. AI-powered review via opencode (requires ZHIPU_API_KEY)
#
# Add this file to your KiCad project repo at:
#   .github/workflows/opencode-interactive.yml
#
# Required secrets:
#   ZHIPU_API_KEY — Zhipu AI API key for opencode LLM access
#
# Optional secrets (for datasheet download):
#   DIGIKEY_CLIENT_ID, DIGIKEY_CLIENT_SECRET
#   MOUSER_SEARCH_API_KEY
#   ELEMENT14_API_KEY

name: opencode-interactive
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  interactive:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y ngspice poppler-utils

      # --- Tier 1: Deterministic analysis ---
      - uses: aklofas/kicad-happy@v1
        id: analysis

      # --- Tier 2: AI-powered review via opencode ---
      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: anomalyco/opencode/github@latest
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: zai-coding-plan/glm-5.1
          agent: build
          use_github_token: true
          prompt: |
            The user has requested a design review or analysis. Read README.md
            in the repo root for board context and design intent.

            The kicad-happy deterministic analysis has already been run. The
            analysis outputs are:
            - Schematic JSON: ${{ steps.analysis.outputs.schematic-json }}
            - PCB JSON: ${{ steps.analysis.outputs.pcb-json }}
            - Markdown report: ${{ steps.analysis.outputs.report-path }}

            Read the reports and the user's request, then provide a detailed
            design review. You can:
            - Interpret and triage the deterministic findings
            - Cross-reference findings across analysis domains
            - Provide engineering recommendations
            - Suggest specific component value changes or layout improvements
            - Run additional kicad-happy analysis scripts if needed
              (scripts are in the kicad-happy action path)

            Respond to the user's comment with your analysis.
